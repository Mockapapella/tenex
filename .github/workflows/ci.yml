name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: coverage-theoretical-max
    env:
      PRE_COMMIT_VERSION: "4.5.1"
      UV_VERSION: "0.10.7"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            receipt_os: linux
            use_wsl: false
          - os: macos-latest
            name: macos
            receipt_os: macos
            use_wsl: false
          - os: windows-latest
            name: windows-wsl2
            receipt_os: windows
            use_wsl: true
    steps:
      - uses: actions/checkout@v4
        with:
          # For pull_request workflows, GitHub Actions uses a synthetic merge commit by default.
          # We check out the PR head SHA so coverage reports can be compared byte-for-byte with
          # reports generated locally on the same commit.
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Download coverage theoretical max summary
        uses: actions/download-artifact@v4
        with:
          name: coverage-theoretical-max
          path: artifacts/theoretical-max
      - name: Restore WSL rustup cache
        if: ${{ matrix.use_wsl }}
        id: wsl-cache-rustup
        uses: actions/cache/restore@v4
        with:
          path: .wsl-cache/rustup.tar.zst
          key: wsl-rustup-v1-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            wsl-rustup-v1-
      - name: Restore WSL cargo-home cache
        if: ${{ matrix.use_wsl }}
        id: wsl-cache-cargo-home
        uses: actions/cache/restore@v4
        with:
          path: .wsl-cache/cargo-home.tar.zst
          key: wsl-cargo-home-v1-${{ hashFiles('Cargo.lock', '.cargo-llvm-cov-version') }}
          restore-keys: |
            wsl-cargo-home-v1-
      - name: Restore WSL uv cache
        if: ${{ matrix.use_wsl }}
        id: wsl-cache-uv
        uses: actions/cache/restore@v4
        with:
          path: .wsl-cache/uv.tar.zst
          key: wsl-uv-v1-${{ env.UV_VERSION }}-${{ env.PRE_COMMIT_VERSION }}-${{ hashFiles('.python-version') }}
          restore-keys: |
            wsl-uv-v1-${{ env.UV_VERSION }}-${{ env.PRE_COMMIT_VERSION }}-
            wsl-uv-v1-
      - name: Fetch remote branches
        if: ${{ !matrix.use_wsl }}
        run: git fetch --prune origin "+refs/heads/*:refs/remotes/origin/*"
      - name: Set up Python
        if: ${{ !matrix.use_wsl }}
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Install Rust
        if: ${{ !matrix.use_wsl }}
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - name: Read cargo-llvm-cov version
        if: ${{ !matrix.use_wsl }}
        id: llvm-cov-version
        run: echo "version=$(cat .cargo-llvm-cov-version)" >> "$GITHUB_OUTPUT"
      - name: Install cargo-llvm-cov
        if: ${{ !matrix.use_wsl }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@${{ steps.llvm-cov-version.outputs.version }}
          checksum: true
          fallback: cargo-binstall
      - name: Cache cargo
        if: ${{ !matrix.use_wsl }}
        uses: Swatinem/rust-cache@v2
      - name: Install pre-commit
        if: ${{ !matrix.use_wsl }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip "uv==${UV_VERSION}"
          uv tool install --python "$(cat .python-version)" "pre-commit==${PRE_COMMIT_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run pre-commit
        if: ${{ !matrix.use_wsl }}
        run: SKIP=cargo-test pre-commit run --all-files --show-diff-on-failure

      - name: Resolve WSL context
        if: ${{ matrix.use_wsl }}
        id: wsl-context
        shell: pwsh
        run: |
          $distro = ""
          $distros = (wsl.exe -l -q) -split "`r?`n" |
            ForEach-Object { $_.Trim() } |
            Where-Object { $_ -ne "" -and $_ -notlike "docker-desktop*" }

          if ($distros.Count -eq 0) {
            Write-Host "No WSL distribution found; provisioning Ubuntu."
            wsl.exe --set-default-version 2
            wsl.exe --install --no-launch --distribution Ubuntu

            # Launch once to complete first-time distro registration.
            wsl.exe -d Ubuntu -e bash -lc "echo WSL ready"
            $distro = "Ubuntu"
          }

          if (-not $distro) {
            $distros = (wsl.exe -l -q) -split "`r?`n" |
              ForEach-Object { $_.Trim() } |
              Where-Object { $_ -ne "" -and $_ -notlike "docker-desktop*" }
            if ($distros.Count -eq 0) {
              throw "No WSL distribution found on runner."
            }
            if ($distros -contains "Ubuntu") {
              $distro = "Ubuntu"
            } else {
              $distro = $distros[0]
            }
          }

          $distro = $distro.Trim([char]0xFEFF)
          if (-not $distro) {
            throw "No WSL distribution found on runner."
          }

          $workspace = (wsl.exe -d $distro -e bash -lc "wslpath -a '${{ github.workspace }}'").Trim()
          if (-not $workspace) {
            throw "Failed to translate GitHub workspace path into WSL path."
          }

          "distro=$distro" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "workspace=$workspace" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare WSL dependencies
        if: ${{ matrix.use_wsl }}
        shell: pwsh
        run: |
          $script = @'
          set -euo pipefail
          mounted="${{ steps.wsl-context.outputs.workspace }}"
          cache_dir="$mounted/.wsl-cache"
          UV_VERSION="${{ env.UV_VERSION }}"
          PRE_COMMIT_VERSION="${{ env.PRE_COMMIT_VERSION }}"
          export UV_INSTALL_DIR="$HOME/.local/share/uv/bin"
          export UV_TOOL_DIR="$HOME/.local/share/uv/tools"
          export UV_TOOL_BIN_DIR="$HOME/.local/share/uv/bin"
          export UV_PYTHON_INSTALL_DIR="$HOME/.local/share/uv/python"
          export UV_CACHE_DIR="$HOME/.local/share/uv/cache"

          cd "$mounted"
          mkdir -p "$cache_dir"

          missing=()
          command -v python3 >/dev/null 2>&1 || missing+=(python3)
          command -v curl >/dev/null 2>&1 || missing+=(curl ca-certificates)
          command -v zstd >/dev/null 2>&1 || missing+=(zstd)
          command -v cc >/dev/null 2>&1 || missing+=(build-essential)
          if [ ${#missing[@]} -ne 0 ]; then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          fi

          mkdir -p "$HOME/.cargo" "$HOME/.rustup" "$UV_INSTALL_DIR" "$UV_TOOL_DIR" "$UV_PYTHON_INSTALL_DIR" "$UV_CACHE_DIR"

          if [ -f "$cache_dir/cargo-home.tar.zst" ]; then
            zstd -dc "$cache_dir/cargo-home.tar.zst" | tar -x -C "$HOME"
          fi
          if [ -f "$cache_dir/rustup.tar.zst" ]; then
            zstd -dc "$cache_dir/rustup.tar.zst" | tar -x -C "$HOME"
          fi
          if [ -f "$cache_dir/uv.tar.zst" ]; then
            zstd -dc "$cache_dir/uv.tar.zst" | tar -x -C "$HOME"
          fi

          export PATH="$UV_INSTALL_DIR:$UV_TOOL_BIN_DIR:$HOME/.cargo/bin:$HOME/.local/bin:$PATH"

          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          fi

          source "$HOME/.cargo/env"

          toolchain="$(awk -F '\"' '/channel =/ { print $2 }' rust-toolchain.toml | head -n 1 | tr -d '\r')"
          if [ -n "$toolchain" ]; then
            rustup toolchain install "$toolchain" --profile minimal --component clippy,rustfmt,llvm-tools-preview
            rustup default "$toolchain"
          fi

          # The Windows checkout can contain CRLF; strip CR so curl/rustup inputs are clean.
          required_cov="$(tr -d '\r\n' < .cargo-llvm-cov-version)"
          installed_cov="$(cargo llvm-cov --version 2>/dev/null | awk '{print $2}' || true)"
          if [ "$installed_cov" != "$required_cov" ]; then
            target="x86_64-unknown-linux-gnu"
            asset="cargo-llvm-cov-${target}.tar.gz"
            url="https://github.com/taiki-e/cargo-llvm-cov/releases/download/v${required_cov}/${asset}"

            tmp_dir="$(mktemp -d)"
            curl -fsSL "$url" -o "$tmp_dir/${asset}"
            tar -xzf "$tmp_dir/${asset}" -C "$tmp_dir"
            install -m 0755 "$tmp_dir/cargo-llvm-cov" "$HOME/.cargo/bin/cargo-llvm-cov"
            rm -rf "$tmp_dir"
          fi

          python_version="$(tr -d '\r\n' < .python-version)"
          # Avoid pip installs into the system Python in WSL (PEP 668 externally-managed-environment).
          uv_target="x86_64-unknown-linux-gnu"
          if ! command -v uv >/dev/null 2>&1 || [ "$(uv --version | awk '{print $2}')" != "$UV_VERSION" ]; then
            uv_asset="uv-${uv_target}.tar.gz"
            uv_sha_asset="${uv_asset}.sha256"
            uv_base="https://github.com/astral-sh/uv/releases/download/${UV_VERSION}"

            tmp_dir="$(mktemp -d)"
            curl -fsSL "${uv_base}/${uv_asset}" -o "$tmp_dir/${uv_asset}"
            curl -fsSL "${uv_base}/${uv_sha_asset}" -o "$tmp_dir/${uv_sha_asset}"
            (cd "$tmp_dir" && sha256sum -c "${uv_sha_asset}")
            tar -xzf "$tmp_dir/${uv_asset}" -C "$tmp_dir"
            install -m 0755 "$tmp_dir/uv-${uv_target}/uv" "$UV_INSTALL_DIR/uv"
            install -m 0755 "$tmp_dir/uv-${uv_target}/uvx" "$UV_INSTALL_DIR/uvx"
            rm -rf "$tmp_dir"
          fi
          uv tool install --python "$python_version" "pre-commit==${PRE_COMMIT_VERSION}"

          rustc -V
          cargo -V
          cargo llvm-cov --version
          pre-commit --version
          '@
          $script = $script -replace "`r", ""
          wsl.exe -d '${{ steps.wsl-context.outputs.distro }}' -e bash -lc "$script"

      - name: Fetch remote branches (WSL)
        if: ${{ matrix.use_wsl }}
        shell: pwsh
        run: |
          $script = @'
          set -euo pipefail
          cd "${{ steps.wsl-context.outputs.workspace }}"
          git fetch --prune origin "+refs/heads/*:refs/remotes/origin/*"
          '@
          $script = $script -replace "`r", ""
          wsl.exe -d '${{ steps.wsl-context.outputs.distro }}' -e bash -lc "$script"

      - name: Normalize checkout line endings (WSL)
        if: ${{ matrix.use_wsl }}
        shell: pwsh
        run: |
          $script = @'
          set -euo pipefail
          cd "${{ steps.wsl-context.outputs.workspace }}"
          git config --local core.autocrlf false
          git config --local core.eol lf
          git reset --hard HEAD
          '@
          $script = $script -replace "`r", ""
          wsl.exe -d '${{ steps.wsl-context.outputs.distro }}' -e bash -lc "$script"

      - name: Stage repo into WSL filesystem
        if: ${{ matrix.use_wsl }}
        shell: pwsh
        run: |
          $script = @'
          set -euo pipefail
          mounted="${{ steps.wsl-context.outputs.workspace }}"
          fast_repo="$HOME/tenex-ci/workspace"
          rm -rf "$fast_repo"
          mkdir -p "$fast_repo"
          tar -C "$mounted" -cf - . | tar -C "$fast_repo" -xf -
          '@
          $script = $script -replace "`r", ""
          wsl.exe -d '${{ steps.wsl-context.outputs.distro }}' -e bash -lc "$script"

      - name: Run pre-commit (WSL)
        if: ${{ matrix.use_wsl }}
        shell: pwsh
        run: |
          $script = @'
          set -euo pipefail
          fast_repo="$HOME/tenex-ci/workspace"
          export PATH="$HOME/.local/share/uv/bin:$HOME/.cargo/bin:$HOME/.local/bin:$PATH"
          export TENEX_CARGO_BUILD_JOBS=4
          cd "$fast_repo"
          SKIP=ensure-post-commit-hook-installed,cargo-test pre-commit run --all-files --show-diff-on-failure
          '@
          $script = $script -replace "`r", ""
          wsl.exe -d '${{ steps.wsl-context.outputs.distro }}' -e bash -lc "$script"

      - name: Export llvm-cov report (per file)
        if: ${{ always() && !matrix.use_wsl }}
        run: |
          set -euo pipefail
          if [ ! -d target/llvm-cov-target/coverage ]; then
            echo "No coverage artifacts found; skipping llvm-cov report export."
            exit 0
          fi
          cargo llvm-cov --branch report --profile coverage --ignore-filename-regex 'crates/vt100-ctt/' > llvm-cov-report.txt
          cargo llvm-cov --branch report --profile coverage --ignore-filename-regex 'crates/vt100-ctt/' --lcov --output-path llvm-cov-report.lcov
          gzip -9 -f llvm-cov-report.lcov
          cargo llvm-cov --branch report --profile coverage --ignore-filename-regex 'crates/vt100-ctt/' --summary-only --json --output-path llvm-cov-report.summary.json
          gzip -9 -f llvm-cov-report.summary.json
          python - <<'PY'
          import hashlib
          import pathlib

          report_path = pathlib.Path("llvm-cov-report.txt")
          digest = hashlib.sha256(report_path.read_bytes()).hexdigest()
          pathlib.Path("llvm-cov-report.sha256").write_text(
              f"{digest}  {report_path.as_posix()}\n",
              encoding="utf-8",
          )
          PY
          cat llvm-cov-report.sha256
          {
            echo "git_sha=$(git rev-parse HEAD)"
            cargo llvm-cov --version
            rustc -V
          } > llvm-cov-meta.txt
          tail -n 3 llvm-cov-report.txt

      - name: Export llvm-cov report (WSL)
        if: ${{ always() && matrix.use_wsl && steps.wsl-context.outcome == 'success' }}
        shell: pwsh
        run: |
          $script = @'
          set -euo pipefail
          mounted="${{ steps.wsl-context.outputs.workspace }}"
          fast_repo="$HOME/tenex-ci/workspace"
          export PATH="$HOME/.cargo/bin:$HOME/.local/bin:$PATH"
          cd "$fast_repo"
          if [ ! -d target/llvm-cov-target/coverage ]; then
            echo "No coverage artifacts found; skipping llvm-cov report export."
            exit 0
          fi
          cargo llvm-cov --branch report --profile coverage --ignore-filename-regex 'crates/vt100-ctt/' > "$mounted/llvm-cov-report.txt"
          cargo llvm-cov --branch report --profile coverage --ignore-filename-regex 'crates/vt100-ctt/' --lcov --output-path "$mounted/llvm-cov-report.lcov"
          gzip -9 -f "$mounted/llvm-cov-report.lcov"
          cargo llvm-cov --branch report --profile coverage --ignore-filename-regex 'crates/vt100-ctt/' --summary-only --json --output-path "$mounted/llvm-cov-report.summary.json"
          gzip -9 -f "$mounted/llvm-cov-report.summary.json"
          cd "$mounted"
          python3 - <<'PY'
          import hashlib
          import pathlib

          report_path = pathlib.Path("llvm-cov-report.txt")
          digest = hashlib.sha256(report_path.read_bytes()).hexdigest()
          pathlib.Path("llvm-cov-report.sha256").write_text(
              f"{digest}  {report_path.as_posix()}\n",
              encoding="utf-8",
          )
          PY
          cat llvm-cov-report.sha256
          {
            echo "git_sha=$(git rev-parse HEAD)"
            cargo llvm-cov --version
            rustc -V
          } > llvm-cov-meta.txt
          tail -n 3 llvm-cov-report.txt
          '@
          $script = $script -replace "`r", ""
          wsl.exe -d '${{ steps.wsl-context.outputs.distro }}' -e bash -lc "$script"

      - name: Verify committed llvm-cov report matches
        if: ${{ always() && !matrix.use_wsl }}
        run: |
          set -euo pipefail
          receipt_os="${{ matrix.receipt_os }}"
          receipt_dir="ci/llvm-cov-receipts/${receipt_os}"
          receipt_report="${receipt_dir}/llvm-cov-report.txt"
          receipt_sha="${receipt_dir}/llvm-cov-report.sha256"

          if [ ! -f "$receipt_report" ]; then
            echo "ERROR: Missing ${receipt_report}" >&2
            echo "Run locally: pre-commit install -t post-commit" >&2
            echo "Then make a commit (it will auto-amend in the report)." >&2
            exit 1
          fi
          diff -u "$receipt_report" llvm-cov-report.txt

          if [ ! -f "$receipt_sha" ]; then
            echo "ERROR: Missing ${receipt_sha}" >&2
            exit 1
          fi

          python - "$receipt_sha" <<'PY'
          import hashlib
          import pathlib
          import sys

          sha_path = pathlib.Path(sys.argv[1])
          line = sha_path.read_text(encoding="utf-8").strip()
          expected_hash, expected_path = line.split(maxsplit=1)
          report_path = pathlib.Path(expected_path)
          if not report_path.is_file():
              raise SystemExit(f"ERROR: sha references missing file: {expected_path}")

          actual_hash = hashlib.sha256(report_path.read_bytes()).hexdigest()
          if actual_hash != expected_hash:
              raise SystemExit(
                  f"ERROR: sha mismatch for {expected_path}: expected {expected_hash}, got {actual_hash}"
              )
          PY

      - name: Verify committed llvm-cov report matches (WSL)
        if: ${{ always() && matrix.use_wsl && steps.wsl-context.outcome == 'success' }}
        shell: pwsh
        run: |
          $script = @'
          set -euo pipefail
          cd "${{ steps.wsl-context.outputs.workspace }}"
          receipt_os="${{ matrix.receipt_os }}"
          receipt_dir="ci/llvm-cov-receipts/${receipt_os}"
          receipt_report="${receipt_dir}/llvm-cov-report.txt"
          receipt_sha="${receipt_dir}/llvm-cov-report.sha256"

          if [ ! -f "$receipt_report" ]; then
            echo "ERROR: Missing ${receipt_report}" >&2
            echo "Run locally: pre-commit install -t post-commit" >&2
            echo "Then make a commit (it will auto-amend in the report)." >&2
            exit 1
          fi
          diff -u "$receipt_report" llvm-cov-report.txt

          if [ ! -f "$receipt_sha" ]; then
            echo "ERROR: Missing ${receipt_sha}" >&2
            exit 1
          fi

          python3 - "$receipt_sha" <<'PY'
          import hashlib
          import pathlib
          import sys

          sha_path = pathlib.Path(sys.argv[1])
          line = sha_path.read_text(encoding="utf-8").strip()
          expected_hash, expected_path = line.split(maxsplit=1)
          report_path = pathlib.Path(expected_path)
          if not report_path.is_file():
              raise SystemExit(f"ERROR: sha references missing file: {expected_path}")

          actual_hash = hashlib.sha256(report_path.read_bytes()).hexdigest()
          if actual_hash != expected_hash:
              raise SystemExit(
                  f"ERROR: sha mismatch for {expected_path}: expected {expected_hash}, got {actual_hash}"
              )
          PY
          '@
          $script = $script -replace "`r", ""
          wsl.exe -d '${{ steps.wsl-context.outputs.distro }}' -e bash -lc "$script"

      - name: Pack WSL cargo-home cache
        if: ${{ always() && matrix.use_wsl && steps.wsl-context.outcome == 'success' && steps.wsl-cache-cargo-home.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          $script = @'
          set -euo pipefail
          mounted="${{ steps.wsl-context.outputs.workspace }}"
          cache_dir="$mounted/.wsl-cache"

          if ! command -v zstd >/dev/null 2>&1; then
            echo "zstd missing; skipping cargo-home cache pack"
            exit 0
          fi

          mkdir -p "$cache_dir"
          rm -f "$HOME/.cargo/credentials" "$HOME/.cargo/credentials.toml" || true

          mkdir -p "$HOME/.cargo"
          tar -C "$HOME" -cf - .cargo | zstd -T0 -3 > "$cache_dir/cargo-home.tar.zst"
          '@
          $script = $script -replace "`r", ""
          wsl.exe -d '${{ steps.wsl-context.outputs.distro }}' -e bash -lc "$script"

      - name: Pack WSL rustup cache
        if: ${{ always() && matrix.use_wsl && steps.wsl-context.outcome == 'success' && steps.wsl-cache-rustup.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          $script = @'
          set -euo pipefail
          mounted="${{ steps.wsl-context.outputs.workspace }}"
          cache_dir="$mounted/.wsl-cache"

          if ! command -v zstd >/dev/null 2>&1; then
            echo "zstd missing; skipping rustup cache pack"
            exit 0
          fi

          mkdir -p "$cache_dir"

          mkdir -p "$HOME/.rustup"
          tar -C "$HOME" -cf - .rustup | zstd -T0 -3 > "$cache_dir/rustup.tar.zst"
          '@
          $script = $script -replace "`r", ""
          wsl.exe -d '${{ steps.wsl-context.outputs.distro }}' -e bash -lc "$script"

      - name: Pack WSL uv cache
        if: ${{ always() && matrix.use_wsl && steps.wsl-context.outcome == 'success' && steps.wsl-cache-uv.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          $script = @'
          set -euo pipefail
          mounted="${{ steps.wsl-context.outputs.workspace }}"
          cache_dir="$mounted/.wsl-cache"

          export UV_INSTALL_DIR="$HOME/.local/share/uv/bin"
          export UV_TOOL_DIR="$HOME/.local/share/uv/tools"
          export UV_TOOL_BIN_DIR="$HOME/.local/share/uv/bin"
          export UV_PYTHON_INSTALL_DIR="$HOME/.local/share/uv/python"
          export UV_CACHE_DIR="$HOME/.local/share/uv/cache"
          export PATH="$UV_INSTALL_DIR:$UV_TOOL_BIN_DIR:$HOME/.cargo/bin:$HOME/.local/bin:$PATH"

          if ! command -v zstd >/dev/null 2>&1; then
            echo "zstd missing; skipping uv cache pack"
            exit 0
          fi

          mkdir -p "$cache_dir"

          if command -v uv >/dev/null 2>&1; then
            uv cache prune --ci || true
          fi

          mkdir -p "$HOME/.local/share/uv"
          tar -C "$HOME" -cf - .local/share/uv | zstd -T0 -3 > "$cache_dir/uv.tar.zst"
          '@
          $script = $script -replace "`r", ""
          wsl.exe -d '${{ steps.wsl-context.outputs.distro }}' -e bash -lc "$script"

      - name: Save WSL cargo-home cache
        if: ${{ always() && matrix.use_wsl && steps.wsl-context.outcome == 'success' && steps.wsl-cache-cargo-home.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .wsl-cache/cargo-home.tar.zst
          key: wsl-cargo-home-v1-${{ hashFiles('Cargo.lock', '.cargo-llvm-cov-version') }}

      - name: Save WSL rustup cache
        if: ${{ always() && matrix.use_wsl && steps.wsl-context.outcome == 'success' && steps.wsl-cache-rustup.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .wsl-cache/rustup.tar.zst
          key: wsl-rustup-v1-${{ hashFiles('rust-toolchain.toml') }}

      - name: Save WSL uv cache
        if: ${{ always() && matrix.use_wsl && steps.wsl-context.outcome == 'success' && steps.wsl-cache-uv.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .wsl-cache/uv.tar.zst
          key: wsl-uv-v1-${{ env.UV_VERSION }}-${{ env.PRE_COMMIT_VERSION }}-${{ hashFiles('.python-version') }}

      - name: Enforce theoretical max coverage
        if: ${{ always() && !matrix.use_wsl }}
        run: |
          set -euo pipefail
          test -f artifacts/theoretical-max/coverage-theoretical-max.json
          test -f llvm-cov-report.summary.json.gz
          python3 scripts/ci/coverage_verify_platform_theoretical_max.py \
            --platform "${{ matrix.receipt_os }}" \
            --json llvm-cov-report.summary.json.gz \
            --theoretical-max artifacts/theoretical-max/coverage-theoretical-max.json

      - name: Enforce theoretical max coverage (WSL)
        if: ${{ always() && matrix.use_wsl && steps.wsl-context.outcome == 'success' }}
        shell: pwsh
        run: |
          $script = @'
          set -euo pipefail
          mounted="${{ steps.wsl-context.outputs.workspace }}"
          cd "$mounted"
          test -f artifacts/theoretical-max/coverage-theoretical-max.json
          test -f llvm-cov-report.summary.json.gz
          python3 scripts/ci/coverage_verify_platform_theoretical_max.py \
            --platform "${{ matrix.receipt_os }}" \
            --json llvm-cov-report.summary.json.gz \
            --theoretical-max artifacts/theoretical-max/coverage-theoretical-max.json
          '@
          $script = $script -replace "`r", ""
          wsl.exe -d '${{ steps.wsl-context.outputs.distro }}' -e bash -lc "$script"

      - name: Upload llvm-cov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llvm-cov-report-${{ matrix.receipt_os }}
          path: |
            llvm-cov-report.txt
            llvm-cov-report.lcov.gz
            llvm-cov-report.summary.json.gz
            llvm-cov-report.sha256
            llvm-cov-meta.txt
          if-no-files-found: ignore

  coverage-theoretical-max-inputs:
    name: Calculate theoretical max test coverage (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    env:
      UV_VERSION: "0.10.7"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            receipt_os: linux
            use_wsl: false
          - os: macos-latest
            name: macos
            receipt_os: macos
            use_wsl: false
          - os: windows-latest
            name: windows-wsl2
            receipt_os: windows
            use_wsl: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        if: ${{ !matrix.use_wsl }}
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Install Rust
        if: ${{ !matrix.use_wsl }}
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: llvm-tools-preview
      - name: Read cargo-llvm-cov version
        if: ${{ !matrix.use_wsl }}
        id: llvm-cov-version
        run: echo "version=$(cat .cargo-llvm-cov-version)" >> "$GITHUB_OUTPUT"
      - name: Install cargo-llvm-cov
        if: ${{ !matrix.use_wsl }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@${{ steps.llvm-cov-version.outputs.version }}
          checksum: true
          fallback: cargo-binstall
      - name: Cache cargo
        if: ${{ !matrix.use_wsl }}
        uses: Swatinem/rust-cache@v2

      - name: Resolve WSL context
        if: ${{ matrix.use_wsl }}
        id: wsl-context
        shell: pwsh
        run: |
          $distro = ""
          $distros = (wsl.exe -l -q) -split "`r?`n" |
            ForEach-Object { $_.Trim() } |
            Where-Object { $_ -ne "" -and $_ -notlike "docker-desktop*" }

          if ($distros.Count -eq 0) {
            Write-Host "No WSL distribution found; provisioning Ubuntu."
            wsl.exe --set-default-version 2
            wsl.exe --install --no-launch --distribution Ubuntu

            # Launch once to complete first-time distro registration.
            wsl.exe -d Ubuntu -e bash -lc "echo WSL ready"
            $distro = "Ubuntu"
          }

          if (-not $distro) {
            $distros = (wsl.exe -l -q) -split "`r?`n" |
              ForEach-Object { $_.Trim() } |
              Where-Object { $_ -ne "" -and $_ -notlike "docker-desktop*" }
            if ($distros.Count -eq 0) {
              throw "No WSL distribution found on runner."
            }
            if ($distros -contains "Ubuntu") {
              $distro = "Ubuntu"
            } else {
              $distro = $distros[0]
            }
          }

          $distro = $distro.Trim([char]0xFEFF)
          if (-not $distro) {
            throw "No WSL distribution found on runner."
          }

          $workspace = (wsl.exe -d $distro -e bash -lc "wslpath -a '${{ github.workspace }}'").Trim()
          if (-not $workspace) {
            throw "Failed to translate GitHub workspace path into WSL path."
          }

          "distro=$distro" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "workspace=$workspace" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare WSL dependencies
        if: ${{ matrix.use_wsl }}
        shell: pwsh
        run: |
          $script = @'
          set -euo pipefail
          mounted="${{ steps.wsl-context.outputs.workspace }}"
          cache_dir="$mounted/.wsl-cache"
          UV_VERSION="${{ env.UV_VERSION }}"
          export UV_INSTALL_DIR="$HOME/.local/share/uv/bin"
          export UV_TOOL_DIR="$HOME/.local/share/uv/tools"
          export UV_TOOL_BIN_DIR="$HOME/.local/share/uv/bin"
          export UV_PYTHON_INSTALL_DIR="$HOME/.local/share/uv/python"
          export UV_CACHE_DIR="$HOME/.local/share/uv/cache"

          cd "$mounted"
          mkdir -p "$cache_dir"

          missing=()
          command -v python3 >/dev/null 2>&1 || missing+=(python3)
          command -v curl >/dev/null 2>&1 || missing+=(curl ca-certificates)
          command -v zstd >/dev/null 2>&1 || missing+=(zstd)
          command -v cc >/dev/null 2>&1 || missing+=(build-essential)
          if [ ${#missing[@]} -ne 0 ]; then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          fi

          mkdir -p "$HOME/.cargo" "$HOME/.rustup" "$UV_INSTALL_DIR" "$UV_TOOL_DIR" "$UV_PYTHON_INSTALL_DIR" "$UV_CACHE_DIR"

          if [ -f "$cache_dir/cargo-home.tar.zst" ]; then
            zstd -dc "$cache_dir/cargo-home.tar.zst" | tar -x -C "$HOME"
          fi
          if [ -f "$cache_dir/rustup.tar.zst" ]; then
            zstd -dc "$cache_dir/rustup.tar.zst" | tar -x -C "$HOME"
          fi
          if [ -f "$cache_dir/uv.tar.zst" ]; then
            zstd -dc "$cache_dir/uv.tar.zst" | tar -x -C "$HOME"
          fi

          export PATH="$UV_INSTALL_DIR:$UV_TOOL_BIN_DIR:$HOME/.cargo/bin:$HOME/.local/bin:$PATH"

          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          fi

          source "$HOME/.cargo/env"

          toolchain="$(awk -F '\"' '/channel =/ { print $2 }' rust-toolchain.toml | head -n 1 | tr -d '\r')"
          if [ -n "$toolchain" ]; then
            rustup toolchain install "$toolchain" --profile minimal --component llvm-tools-preview
            rustup default "$toolchain"
          fi

          # The Windows checkout can contain CRLF; strip CR so curl/rustup inputs are clean.
          required_cov="$(tr -d '\r\n' < .cargo-llvm-cov-version)"
          installed_cov="$(cargo llvm-cov --version 2>/dev/null | awk '{print $2}' || true)"
          if [ "$installed_cov" != "$required_cov" ]; then
            target="x86_64-unknown-linux-gnu"
            asset="cargo-llvm-cov-${target}.tar.gz"
            url="https://github.com/taiki-e/cargo-llvm-cov/releases/download/v${required_cov}/${asset}"

            tmp_dir="$(mktemp -d)"
            curl -fsSL "$url" -o "$tmp_dir/${asset}"
            tar -xzf "$tmp_dir/${asset}" -C "$tmp_dir"
            install -m 0755 "$tmp_dir/cargo-llvm-cov" "$HOME/.cargo/bin/cargo-llvm-cov"
            rm -rf "$tmp_dir"
          fi

          rustc -V
          cargo -V
          cargo llvm-cov --version
          '@
          $script = $script -replace "`r", ""
          wsl.exe -d '${{ steps.wsl-context.outputs.distro }}' -e bash -lc "$script"

      - name: Stage repo into WSL filesystem
        if: ${{ matrix.use_wsl }}
        shell: pwsh
        run: |
          $script = @'
          set -euo pipefail
          mounted="${{ steps.wsl-context.outputs.workspace }}"
          fast_repo="$HOME/tenex-ci/workspace"
          rm -rf "$fast_repo"
          mkdir -p "$fast_repo"
          tar -C "$mounted" -cf - . | tar -C "$fast_repo" -xf -
          '@
          $script = $script -replace "`r", ""
          wsl.exe -d '${{ steps.wsl-context.outputs.distro }}' -e bash -lc "$script"

      - name: Export instrumented lcov (list-only)
        if: ${{ !matrix.use_wsl }}
        run: |
          set -euo pipefail
          cargo llvm-cov \
            --branch \
            --all-targets \
            --all-features \
            --profile coverage \
            --ignore-filename-regex 'crates/vt100-ctt/' \
            --no-report \
            -- --list
          cargo llvm-cov --branch report \
            --profile coverage \
            --ignore-filename-regex 'crates/vt100-ctt/' \
            --lcov \
            --output-path llvm-cov-instrumented.lcov
          gzip -9 -f llvm-cov-instrumented.lcov
          cargo llvm-cov --branch report \
            --profile coverage \
            --ignore-filename-regex 'crates/vt100-ctt/' \
            --summary-only \
            --json \
            --output-path llvm-cov-instrumented.summary.json
          gzip -9 -f llvm-cov-instrumented.summary.json

      - name: Export instrumented lcov (list-only) (WSL)
        if: ${{ matrix.use_wsl && steps.wsl-context.outcome == 'success' }}
        shell: pwsh
        run: |
          $script = @'
          set -euo pipefail
          mounted="${{ steps.wsl-context.outputs.workspace }}"
          fast_repo="$HOME/tenex-ci/workspace"
          export PATH="$HOME/.cargo/bin:$HOME/.local/bin:$PATH"
          cd "$fast_repo"
          cargo llvm-cov \
            --branch \
            --all-targets \
            --all-features \
            --profile coverage \
            --ignore-filename-regex 'crates/vt100-ctt/' \
            --no-report \
            -- --list
          cargo llvm-cov --branch report \
            --profile coverage \
            --ignore-filename-regex 'crates/vt100-ctt/' \
            --lcov \
            --output-path "$mounted/llvm-cov-instrumented.lcov"
          gzip -9 -f "$mounted/llvm-cov-instrumented.lcov"
          cargo llvm-cov --branch report \
            --profile coverage \
            --ignore-filename-regex 'crates/vt100-ctt/' \
            --summary-only \
            --json \
            --output-path "$mounted/llvm-cov-instrumented.summary.json"
          gzip -9 -f "$mounted/llvm-cov-instrumented.summary.json"
          '@
          $script = $script -replace "`r", ""
          wsl.exe -d '${{ steps.wsl-context.outputs.distro }}' -e bash -lc "$script"

      - name: Upload instrumented lcov
        uses: actions/upload-artifact@v4
        with:
          name: llvm-cov-instrumented-${{ matrix.receipt_os }}
          path: |
            llvm-cov-instrumented.lcov.gz
            llvm-cov-instrumented.summary.json.gz

  coverage-theoretical-max:
    name: coverage theoretical max
    runs-on: ubuntu-latest
    needs: coverage-theoretical-max-inputs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Download llvm-cov instrumented artifacts (linux)
        uses: actions/download-artifact@v4
        with:
          name: llvm-cov-instrumented-linux
          path: artifacts/linux
      - name: Download llvm-cov instrumented artifacts (macos)
        uses: actions/download-artifact@v4
        with:
          name: llvm-cov-instrumented-macos
          path: artifacts/macos
      - name: Download llvm-cov instrumented artifacts (windows)
        uses: actions/download-artifact@v4
        with:
          name: llvm-cov-instrumented-windows
          path: artifacts/windows

      - name: Compute theoretical max coverage
        run: |
          set -euo pipefail
          python3 scripts/ci/coverage_theoretical_max.py \
            --linux-json artifacts/linux/llvm-cov-instrumented.summary.json.gz \
            --macos-json artifacts/macos/llvm-cov-instrumented.summary.json.gz \
            --windows-json artifacts/windows/llvm-cov-instrumented.summary.json.gz \
            --out coverage-theoretical-max.json

      - name: Verify committed theoretical max matches
        run: |
          set -euo pipefail
          receipt_dir="ci/coverage-theoretical-max-receipts"
          receipt_report="${receipt_dir}/coverage-theoretical-max.json"
          receipt_sha="${receipt_dir}/coverage-theoretical-max.sha256"

          if [ ! -f "$receipt_report" ]; then
            echo "ERROR: Missing ${receipt_report}" >&2
            echo "Run locally: TENEX_REMOTE_MAC_HOST=<host> TENEX_REMOTE_WINDOWS_HOST=<host> python3 scripts/precommit/pre_push_theoretical_max_gate.py" >&2
            echo "Then commit (post-commit hook amends the theoretical-max receipt)." >&2
            exit 1
          fi

          diff -u "$receipt_report" coverage-theoretical-max.json

          if [ ! -f "$receipt_sha" ]; then
            echo "ERROR: Missing ${receipt_sha}" >&2
            exit 1
          fi

          python3 - "$receipt_sha" <<'PY'
          import hashlib
          import pathlib
          import sys

          sha_path = pathlib.Path(sys.argv[1])
          line = sha_path.read_text(encoding="utf-8").strip()
          expected_hash, expected_path = line.split(maxsplit=1)
          report_path = pathlib.Path(expected_path)
          if not report_path.is_file():
              raise SystemExit(f"ERROR: sha references missing file: {expected_path}")

          actual_hash = hashlib.sha256(report_path.read_bytes()).hexdigest()
          if actual_hash != expected_hash:
              raise SystemExit(
                  f"ERROR: sha mismatch for {expected_path}: expected {expected_hash}, got {actual_hash}"
              )
          PY

      - name: Upload theoretical max coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-theoretical-max
          path: coverage-theoretical-max.json
