repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo
        args: [fmt, --all, --, --check]
        language: system
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo
        args: [clippy, --lib, --bins, --, -D, warnings]
        language: system
        pass_filenames: false
